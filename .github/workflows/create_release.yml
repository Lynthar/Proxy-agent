name: Release Check

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read version from install.sh
        id: version
        run: |
          FILE_VERSION=$(grep -oP '当前版本：v[0-9]+\.[0-9]+\.[0-9]+' install.sh | sed 's/当前版本：//')
          echo "file_version=$FILE_VERSION" >> $GITHUB_OUTPUT
          echo $FILE_VERSION

      - name: Get latest release
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const {data:latest} = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            }).catch(() => ({ data: null }));
            return latest ? latest.tag_name: "";
          result-encoding: string

      - name: Compute install.sh SHA256
        if: ${{ steps.version.outputs.file_version != steps.latest.outputs.tag }}
        run: |
          HASH=$(sha256sum install.sh | awk '{print $1}')
          # Format matches sha256sum output so verifyInstallSHA256 in install.sh
          # can `awk '{print $1}'` to extract the hash.
          echo "${HASH}  install.sh" > install.sh.sha256
          echo "Computed SHA256: ${HASH}"

      - name: Create release, upload assets, cleanup old ones
        if: ${{ steps.version.outputs.file_version != steps.latest.outputs.tag }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = "${{ steps.version.outputs.file_version }}";

            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const lastMessage = commits.data[0].commit.message;

            let release;
            try {
              const result = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                body: lastMessage
              });
              release = result.data;
            } catch (err) {
              console.log(`Skip release ${err.message}`);
              return;
            }

            // Attach SHA256 checksum as a release asset.
            // install.sh pulls this at update time via verifyInstallSHA256.
            try {
              const sha256Content = fs.readFileSync('install.sh.sha256');
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: 'install.sh.sha256',
                data: sha256Content
              });
              console.log(`✓ Uploaded install.sh.sha256 for ${tag}`);
            } catch (err) {
              console.log(`⚠ Failed to upload sha256 asset: ${err.message}`);
            }

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const oldReleases = releases.slice(3);
            for (const rel of oldReleases) {
              console.log(`🗑 Deleting old release ${rel.tag_name} (id=${rel.id})`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id
              }).catch(err => console.log(`Skip release ${rel.id}: ${err.message}`));
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${rel.tag_name}`
              }).catch(err => console.log(`Skip tag ${rel.tag_name}: ${err.message}`));
            }
