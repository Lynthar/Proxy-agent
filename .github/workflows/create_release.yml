name: Release Check

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          # Source of truth is the VERSION file. The old "grep '当前版本：v...'
          # install.sh" line broke silently when commit 8c6f5d6 moved version
          # tracking into _load_version() — FILE_VERSION had been empty since.
          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file is missing"
            exit 1
          fi
          RAW="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION content is not semver (got: '$RAW')"
            exit 1
          fi
          FILE_VERSION="v$RAW"
          echo "file_version=$FILE_VERSION" >> $GITHUB_OUTPUT
          echo "Read version: $FILE_VERSION"

      - name: Get latest release
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const {data:latest} = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            }).catch(() => ({ data: null }));
            return latest ? latest.tag_name: "";
          result-encoding: string

      - name: Compute install.sh SHA256
        if: ${{ steps.version.outputs.file_version != steps.latest.outputs.tag }}
        run: |
          HASH=$(sha256sum install.sh | awk '{print $1}')
          # Format matches sha256sum output so verifyInstallSHA256 in install.sh
          # can `awk '{print $1}'` to extract the hash.
          echo "${HASH}  install.sh" > install.sh.sha256
          echo "Computed SHA256: ${HASH}"

      - name: Build lib_bundle.tar.gz + SHA256
        if: ${{ steps.version.outputs.file_version != steps.latest.outputs.tag }}
        run: |
          # Bundle lib/, shell/lang/, and VERSION into a single tarball that
          # install.sh's _bootstrap_libs can fetch when lib/ is missing locally.
          # SHA256 is published alongside so bootstrap can do strong verification
          # (matches the install.sh.sha256 pattern above).
          tar czf lib_bundle.tar.gz lib/ shell/lang/ VERSION
          BUNDLE_HASH=$(sha256sum lib_bundle.tar.gz | awk '{print $1}')
          echo "${BUNDLE_HASH}  lib_bundle.tar.gz" > lib_bundle.tar.gz.sha256
          echo "Bundle SHA256: ${BUNDLE_HASH}"
          echo "Bundle size: $(stat -c %s lib_bundle.tar.gz) bytes"

      - name: Create release, upload assets, cleanup old ones
        if: ${{ steps.version.outputs.file_version != steps.latest.outputs.tag }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = "${{ steps.version.outputs.file_version }}";

            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const lastMessage = commits.data[0].commit.message;

            let release;
            try {
              const result = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                body: lastMessage
              });
              release = result.data;
            } catch (err) {
              console.log(`Skip release ${err.message}`);
              return;
            }

            // Helper: upload one file as a release asset, log + swallow errors.
            // We don't want a single asset upload failure to abort the rest of
            // the release pipeline (e.g. install.sh.sha256 should still attach
            // even if lib_bundle had a transient upload glitch, and vice versa).
            async function uploadAsset(filename, label) {
              try {
                const data = fs.readFileSync(filename);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  name: filename,
                  data: data
                });
                console.log(`✓ Uploaded ${label} for ${tag}`);
              } catch (err) {
                console.log(`⚠ Failed to upload ${label}: ${err.message}`);
              }
            }

            // install.sh.sha256 — used by verifyInstallSHA256 during self-update.
            await uploadAsset('install.sh.sha256', 'install.sh.sha256');

            // lib_bundle.tar.gz + .sha256 — used by install.sh's _bootstrap_libs
            // to grab lib/ + shell/lang/ when they're missing on first run.
            await uploadAsset('lib_bundle.tar.gz', 'lib_bundle.tar.gz');
            await uploadAsset('lib_bundle.tar.gz.sha256', 'lib_bundle.tar.gz.sha256');

            // Old releases and tags are intentionally retained — manual cleanup only.
            // Tag deletion would orphan history references (issues, git log v1.x..v2.y),
            // and removing release assets breaks self-update SHA256 verification for any
            // user who pinned an older version.
